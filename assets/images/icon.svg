<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00897b"/>
      <stop offset="100%" stop-color="#004d40"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- ── Microphone (shifted left to make room for form) ─────────────────── -->

  <!-- Capsule body -->
  <rect x="163" y="65" width="85" height="140" rx="42" fill="white"/>

  <!-- Stand bracket (U-shaped arc) -->
  <path d="M 143 195 C 143 325 268 325 268 195"
        stroke="white" stroke-width="15" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stand vertical -->
  <line x1="205" y1="293" x2="205" y2="330"
        stroke="white" stroke-width="15" stroke-linecap="round"/>

  <!-- Stand base -->
  <line x1="160" y1="330" x2="250" y2="330"
        stroke="white" stroke-width="15" stroke-linecap="round"/>

  <!-- ── Form / document (overlaps mic stand, drawn on top) ─────────────── -->

  <!-- Paper -->
  <rect x="192" y="258" width="155" height="148" rx="14" fill="white"/>

  <!-- Title strip -->
  <rect x="210" y="275" width="92" height="12" rx="5" fill="#b2dfdb"/>

  <!-- Field lines -->
  <line x1="210" y1="308" x2="330" y2="308"
        stroke="#00897b" stroke-width="9" stroke-linecap="round"/>
  <line x1="210" y1="333" x2="312" y2="333"
        stroke="#00897b" stroke-width="9" stroke-linecap="round"/>
  <line x1="210" y1="358" x2="322" y2="358"
        stroke="#00897b" stroke-width="9" stroke-linecap="round"/>
  <line x1="210" y1="383" x2="298" y2="383"
        stroke="#00897b" stroke-width="9" stroke-linecap="round"/>

  <!-- ── Pen (within safe zone, overlapping form corner) ────────────────── -->

  <g transform="translate(312,378) rotate(-42)">
    <!-- Body -->
    <rect x="-9" y="-68" width="18" height="90" rx="5" fill="#e0f2f1"/>
    <!-- Cap -->
    <rect x="-9" y="-68" width="18" height="20" rx="5" fill="#80cbc4"/>
    <!-- Grip band -->
    <rect x="-9" y="-22" width="18" height="8" rx="2" fill="#4db6ac" opacity="0.7"/>
    <!-- Tip -->
    <polygon points="-9,22 9,22 0,44" fill="#004d40"/>
    <!-- Tip sheen -->
    <polygon points="2,22 9,22 0,44" fill="#00695c" opacity="0.4"/>
  </g>
</svg>
